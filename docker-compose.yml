services:
  nemotron-asr:
    build:
      context: .
      args:
        BASE_IMAGE: nvcr.io/nvidia/nemo:25.11.01
        NEMO_SOURCE_REF: d947ef7be814e3034dfed298f0c1c3c2137bced5
    image: nemotron-asr-streaming-api:0.1.0
    ports:
      - "8000:8000"
    gpus: all
    shm_size: "8gb"
    environment:
      NEMO_MODEL_PATH: /models/nemotron-3.5-asr-streaming-0.6b.nemo
      SILERO_VAD_MODEL_PATH: /opt/nemotron-asr/silero_vad.jit
      TARGET_LANG: auto
      ATT_CONTEXT_SIZE: "[56,3]"
      STRIP_LANG_TAGS: "true"
      TURN_DETECTION: server_vad
      VAD_THRESHOLD: "0.6"
      VAD_PREFIX_PADDING_MS: "300"
      VAD_SILENCE_DURATION_MS: "500"
      PARTIAL_INTERVAL_MS: "500"
      MAX_SESSIONS: "1"
    volumes:
      - /srv/models/nemotron:/models:ro
